/* SMART LAYOUT (IE10+ support)*/

.sl-horizontal {
/* Creates a smart layout oriented horizontally.  Children will not wrap
 * unless sl-wrap is also applied.
 *
 *                                                                 MAIN AXIS
 *     <div class="sl-horizontal">     ------------------------>
 *         <div id="1"></div>        | +-------------------+
 *         <div id="2"></div>        | | +---+ +---+ +---+ |
 *         <div id="3"></div>        | | | 1 | | 2 | | 3 | |
 *     </div>                        | | +---+ +---+ +---+ |
 *                                   | +-------------------+
 *                                   |
 *                                   V  CROSS AXIS
 */
	display:        inline-flex;
	display:        inline-flexbox; /* 2012 syntax */
	flex-direction: row;
	flex-wrap:      nowrap;
}
.sl-vertical {
/* Creates a smart layout oriented vertically.  Children will not wrap unless
 * sl-wrap is also applied.
 *
 *                                        CROSS AXIS
 *     <div class="sl-vertical">       ------------>
 *         <div id="1"></div>        | +-------+
 *         <div id="2"></div>        | | +---+ |
 *         <div id="3"></div>        | | | 1 | |
 *     </div>                        | | +---+ |
 *                                   | | +---+ |
 *                                   | | | 2 | |
 *                                   | | +---+ |
 *                                   | | +---+ |
 *                                   | | | 3 | |
 *                                   | | +---+ |
 *                                   | +-------+
 *                                   |
 *                                   V  MAIN AXIS
 */
	display:        inline-flex;
	display:        inline-flexbox; /* 2012 syntax */
	flex-direction: column;
	flex-wrap:      nowrap;
}

.sl-wrap {
/* Makes children of a smart layout wrap on a new line in the direction of the
 * cross axis.
 *
 *                                                                 MAIN AXIS
 *     <div class="sl-horizontal sl-wrap">     ------------------------>
 *         <div id="1"></div>                 | +-------------------+
 *         <div id="2"></div>                 | | +---+ +---+ +---+ |
 *         <div id="3"></div>                 | | | 1 | | 2 | | 3 | |
 *         <div id="4"></div>                 | | +---+ +---+ +---+ |
 *     </div>                                 | | +---+ +---+       |
 *                                            | | | 4 | | 5 |       |
 *                                            | | +---+ +---+       |
 *                                            | +-------------------+
 *                                            |
 *                                            V  CROSS AXIS
 */
	flex-wrap: wrap;
}

sl-horizontal sl-top-left {
